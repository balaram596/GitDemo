<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Polls</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">

        <h1 class="text-center mb-5">Active Polls</h1>

        <div class="row g-4">

            <!-- President Election -->
            <div class="col-md-6 col-lg-4">
                <div class="card shadow h-100">

                    <div class="card-header bg-primary text-white">
                        President Election
                    </div>

                    <div class="card-body">
                        <p>
                            <strong>Status:</strong>
                            <span class="badge bg-success">Active</span>
                        </p>

                        <p><strong>Start:</strong> June 1</p>
                        <p><strong>End:</strong> June 10</p>
                    </div>

                    <div class="card-footer text-center">
                        <a href="vote.html" class="btn btn-primary">
                            Vote Now
                        </a>
                    </div>

                </div>
            </div>

            <!-- Secretary Election -->
            <div class="col-md-6 col-lg-4">
                <div class="card shadow h-100">

                    <div class="card-header bg-info text-white">
                        Secretary Election
                    </div>

                    <div class="card-body">
                        <p>
                            <strong>Status:</strong>
                            <span class="badge bg-success">Active</span>
                        </p>

                        <p><strong>Start:</strong> June 1</p>
                        <p><strong>End:</strong> June 10</p>
                    </div>

                    <div class="card-footer text-center">
                        <a href="vote.html" class="btn btn-info text-white">
                            Vote Now
                        </a>
                    </div>

                </div>
            </div>

            <!-- Treasurer Election -->
            <div class="col-md-6 col-lg-4">
                <div class="card shadow h-100">

                    <div class="card-header bg-secondary text-white">
                        Treasurer Election
                    </div>

                    <div class="card-body">
                        <p>
                            <strong>Status:</strong>
                            <span class="badge bg-danger">Closed</span>
                        </p>

                        <p>Voting has ended for this election.</p>
                    </div>

                    <div class="card-footer text-center">
                        <button class="btn btn-secondary" disabled>
                            Voting Closed
                        </button>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
