<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f6f9;
        }
        .back-btn{
         position: relative;
         top: 20px;
         left: 20px;
         z-index: 1000;
        }

        .profile-container{
            max-width:500px;
            margin:50px auto;
        }

        .profile-img{
            width:150px;
            height:150px;
            object-fit:cover;
            border:4px solid #0d6efd;
        }

        body{
    background:#f4f6f9;
    }

        .card{
    border-radius:20px;
    }

        table th{
    width:40%;
    }
    </style>
</head>

<div class="modal fade"
     id="logoutModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Logout Confirmation
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">
                Are you sure you want to logout?
            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-danger">
                    Logout
                </button>

            </div>

        </div>

    </div>

</div>

<body>
    <div class="mb-3">
        <a href="index.html" class="btn btn-primary back-btn">
            ← Back to Home
        </a>
    </div>

<div class="container py-5">

    <div class="card shadow-lg border-0 mx-auto" style="max-width:600px;">

        <!-- Profile Header -->
        
        <div class="card-header text-center text-white py-4"
             style="background: linear-gradient(135deg,#0d6efd,#6610f2);">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 alt="Profile Image"
                 class="rounded-circle border border-4 border-white mb-3"
                 width="130"
                 height="130">

            <h3 class="mb-1">Rahul Sharma</h3>

            <span class="badge bg-light text-dark">
                Student ID: 22CSE101
            </span>

        </div>

        <!-- Profile Body -->
        <div class="card-body">

            <h5 class="mb-3 text-primary">
                Student Information
            </h5>

            <table class="table">

                <tr>
                    <th>Roll Number</th>
                    <td>22CSE101</td>
                </tr>

                <tr>
                    <th>Branch</th>
                    <td>Computer Science Engineering</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>rahul@gmail.com</td>
                </tr>

                <tr>
                    <th>Mobile</th>
                    <td>+91 9876543210</td>
                </tr>

                <tr>
                    <th>Attendance</th>
                    <td>
                        <span class="badge bg-success">
                            92%
                        </span>
                    </td>
                </tr>

            </table>

            <div class="text-center mt-4">

                <button class="btn btn-success me-2">
                    Edit Profile
                </button>

                <button class="btn btn-outline-primary me-2">
                    View Results
                </button>

                <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#logoutModal">
                     Logout
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
