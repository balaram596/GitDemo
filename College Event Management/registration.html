<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#09031d,#130538,#1a0752);
    min-height:100vh;
}

/* Navbar */

.navbar{
    background:rgba(8,8,40,.95);
    border-bottom:1px solid rgba(255,255,255,.1);
}

.navbar-brand{
    font-weight:700;
    font-size:1.8rem;
}

/* Registration Section */

.registration-section{
    padding:120px 0 80px;
}

.form-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.form-title{
    text-align:center;
    margin-bottom:30px;
}

.form-title h1{
    font-weight:800;
}

.form-control,
.form-select{
    padding:12px;
    border-radius:12px;
}

.register-btn{
    width:100%;
    background:#ffc107;
    color:black;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:700;
    margin-top:10px;
    transition:.3s;
}

.register-btn:hover{
    transform:translateY(-3px);
}

#successMessage{
    display:none;
    margin-top:25px;
}

footer{
    background:#05031b;
    color:#aaa;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand" href="index.html">
<i class="bi bi-mortarboard-fill text-warning"></i>
College Events
</a>

</div>
</nav>

<!-- Registration Form -->

<section class="registration-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="form-card">

<div class="form-title">
<h1>Event Registration</h1>
<p>Register for your favorite college event</p>
</div>

<form id="registrationForm">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Branch</label>
<select class="form-select" required>
<option value="">Select Branch</option>
<option>CSE</option>
<option>CSM</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
<option>IT</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Event Selection</label>
<select class="form-select" required>
<option value="">Choose Event</option>
<option>Technical Quiz</option>
<option>Hackathon</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>
</select>
</div>

<button type="submit" class="register-btn">
Register Now
</button>

</form>

<div id="successMessage" class="alert alert-success text-center">
✅ Registration Successful! Thank you for registering.
</div>

</div>

</div>

</div>

</div>

</section>

<footer>
© 2026 College Event Management Portal | All Rights Reserved
</footer>

<script>

document.getElementById("registrationForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    document.getElementById("successMessage")
    .style.display = "block";

    this.reset();

});

</script>

</body>
</html>
